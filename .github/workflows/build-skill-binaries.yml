name: Build Scoped CLI Binaries

on:
  push:
    branches: [main]
    paths:
      - '.agents/skills/prd-to-product-agents/**'
      - 'cli-tools/**'
      - 'bin/**'
      - '.github/workflows/**'
      - '.github/workflows/build-skill-binaries.yml'
  pull_request:
    branches: [main]
    paths:
      - '.agents/skills/prd-to-product-agents/**'
      - 'cli-tools/**'
      - 'bin/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: read
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-x64
    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.suffix }})
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build skill CLI (prd-to-product-agents-cli)
        run: cargo build --release --target ${{ matrix.target }} --manifest-path cli-tools/prd-to-product-agents-cli/Cargo.toml

      - name: Build project CLI (skill-dev-cli)
        run: cargo build --release --target ${{ matrix.target }} --manifest-path cli-tools/skill-dev-cli/Cargo.toml

      - name: Build workspace runtime CLI (prdtp-agents-functions-cli)
        run: cargo build --release --target ${{ matrix.target }} --manifest-path cli-tools/prdtp-agents-functions-cli/Cargo.toml --features published-skill-contract

      - name: Validate published binary contract (Unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          BOOTSTRAP="cli-tools/prd-to-product-agents-cli/target/${{ matrix.target }}/release/prd-to-product-agents-cli"
          RUNTIME="cli-tools/prdtp-agents-functions-cli/target/${{ matrix.target }}/release/prdtp-agents-functions-cli"
          "${BOOTSTRAP}" validate package --help > /dev/null
          "${BOOTSTRAP}" validate all --help > /dev/null
          if "${RUNTIME}" --help | grep -qE '^[[:space:]]+github([[:space:]]|$)'; then
            echo "published runtime unexpectedly exposes github command" >&2
            exit 1
          fi
          if "${RUNTIME}" governance --help | grep -qE '^[[:space:]]+promote-enterprise-readiness([[:space:]]|$)'; then
            echo "published runtime unexpectedly exposes enterprise promotion helper" >&2
            exit 1
          fi
          if "${RUNTIME}" audit --help | grep -qE '^[[:space:]]+export([[:space:]]|$)'; then
            echo "published runtime unexpectedly exposes audit export" >&2
            exit 1
          fi

      - name: Validate published binary contract (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $bootstrap = "cli-tools\prd-to-product-agents-cli\target\${{ matrix.target }}\release\prd-to-product-agents-cli.exe"
          $runtime = "cli-tools\prdtp-agents-functions-cli\target\${{ matrix.target }}\release\prdtp-agents-functions-cli.exe"
          & $bootstrap validate package --help | Out-Null
          & $bootstrap validate all --help | Out-Null
          $runtimeHelp = (& $runtime --help | Out-String)
          if ($runtimeHelp -match '(?m)^[ ]+github([ ]|$)') {
            throw 'published runtime unexpectedly exposes github command'
          }
          $governanceHelp = (& $runtime governance --help | Out-String)
          if ($governanceHelp -match '(?m)^[ ]+promote-enterprise-readiness([ ]|$)') {
            throw 'published runtime unexpectedly exposes enterprise promotion helper'
          }
          $auditHelp = (& $runtime audit --help | Out-String)
          if ($auditHelp -match '(?m)^[ ]+export([ ]|$)') {
            throw 'published runtime unexpectedly exposes audit export'
          }

      - name: Stage scoped binaries (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp "cli-tools/prd-to-product-agents-cli/target/${{ matrix.target }}/release/prd-to-product-agents-cli" \
             "staging/prd-to-product-agents-cli-${{ matrix.suffix }}"
          cp "cli-tools/skill-dev-cli/target/${{ matrix.target }}/release/skill-dev-cli" \
             "staging/skill-dev-cli-${{ matrix.suffix }}"
          cp "cli-tools/prdtp-agents-functions-cli/target/${{ matrix.target }}/release/prdtp-agents-functions-cli" \
             "staging/prdtp-agents-functions-cli-${{ matrix.suffix }}"

      - name: Stage scoped binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path staging -Force | Out-Null
          Copy-Item "cli-tools\prd-to-product-agents-cli\target\${{ matrix.target }}\release\prd-to-product-agents-cli.exe" `
            "staging\prd-to-product-agents-cli-${{ matrix.suffix }}.exe"
          Copy-Item "cli-tools\skill-dev-cli\target\${{ matrix.target }}\release\skill-dev-cli.exe" `
            "staging\skill-dev-cli-${{ matrix.suffix }}.exe"
          Copy-Item "cli-tools\prdtp-agents-functions-cli\target\${{ matrix.target }}\release\prdtp-agents-functions-cli.exe" `
            "staging\prdtp-agents-functions-cli-${{ matrix.suffix }}.exe"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.suffix }}
          path: staging/
          retention-days: 30

      - name: Attest staged binaries
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: staging/

  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    name: Test (${{ matrix.os }})
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Test skill CLI
        run: cargo test --manifest-path cli-tools/prd-to-product-agents-cli/Cargo.toml

      - name: Test project CLI
        run: cargo test --manifest-path cli-tools/skill-dev-cli/Cargo.toml

      - name: Test workspace runtime CLI
        run: cargo test --manifest-path cli-tools/prdtp-agents-functions-cli/Cargo.toml

  release-gate:
    needs: [build, test]
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux-x64
          - os: macos-latest
            suffix: darwin-arm64
          - os: windows-latest
            suffix: windows-x64
    runs-on: ${{ matrix.os }}
    name: Release Gate (${{ matrix.os }})
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          path: collected
          pattern: binaries-${{ matrix.suffix }}
          merge-multiple: true

      - name: Run release gate (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x collected/skill-dev-cli-${{ matrix.suffix }} \
                    collected/prd-to-product-agents-cli-${{ matrix.suffix }} \
                    collected/prdtp-agents-functions-cli-${{ matrix.suffix }}
          chmod +x .agents/skills/prd-to-product-agents/bin/prd-to-product-agents-cli-* \
                    .agents/skills/prd-to-product-agents/templates/workspace/.agents/bin/prd-to-product-agents/prdtp-agents-functions-cli-*
          collected/skill-dev-cli-${{ matrix.suffix }} --skill-root .agents/skills/prd-to-product-agents test release-gate

      - name: Run release gate (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          collected\skill-dev-cli-${{ matrix.suffix }}.exe --skill-root .agents\skills\prd-to-product-agents test release-gate

  publish:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && github.actor != 'github-actions[bot]'
    needs: [build, test, release-gate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    name: Propose scoped binary refresh
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: collected
          pattern: binaries-*
          merge-multiple: true

      - name: List collected binaries
        run: ls -lh collected/

      - name: Prepare tracked binaries and checksums
        run: |
          set -euo pipefail
          ROOT_BIN_DIR="bin"
          SKILL_BIN_DIR=".agents/skills/prd-to-product-agents/bin"
          WORKSPACE_RUNTIME_BIN_DIR=".agents/skills/prd-to-product-agents/templates/workspace/.agents/bin/prd-to-product-agents"
          # No supported local publish path: tracked binaries refresh only through this workflow and its reviewable PR.
          mkdir -p "${ROOT_BIN_DIR}" "${SKILL_BIN_DIR}" "${WORKSPACE_RUNTIME_BIN_DIR}"
          rm -f "${SKILL_BIN_DIR}"/prdtp-agents-functions-cli-*
          rm -f "${WORKSPACE_RUNTIME_BIN_DIR}"/prdtp-agents-functions-cli-*
          # Project-scope tool: stays only in the repository root bin/.
          cp collected/skill-dev-cli-* "${ROOT_BIN_DIR}/"
          # Skill-scope bootstrap tool: shipped with the skill package.
          cp collected/prd-to-product-agents-cli-* "${SKILL_BIN_DIR}/"
          # Workspace runtime tool: shipped inside the generated workspace template.
          cp collected/prdtp-agents-functions-cli-* "${WORKSPACE_RUNTIME_BIN_DIR}/"
          python .github/scripts/generate_bundle_metadata.py --bundle-dir "${ROOT_BIN_DIR}" --bundle-name "skill-dev-cli-published-bundle" --namespace "https://github.com/paul-barzallo/skill-prd-to-product-agents/spdx/skill-dev-cli-published-bundle" --repo "paul-barzallo/skill-prd-to-product-agents" --signer-workflow "paul-barzallo/skill-prd-to-product-agents/.github/workflows/build-skill-binaries.yml" --source-ref "refs/heads/main"
          python .github/scripts/generate_bundle_metadata.py --bundle-dir "${SKILL_BIN_DIR}" --bundle-name "prd-to-product-agents-skill-bootstrap-bundle" --namespace "https://github.com/paul-barzallo/skill-prd-to-product-agents/spdx/prd-to-product-agents-skill-bootstrap-bundle" --repo "paul-barzallo/skill-prd-to-product-agents" --signer-workflow "paul-barzallo/skill-prd-to-product-agents/.github/workflows/build-skill-binaries.yml" --source-ref "refs/heads/main"
          python .github/scripts/generate_bundle_metadata.py --bundle-dir "${WORKSPACE_RUNTIME_BIN_DIR}" --bundle-name "prd-to-product-agents-workspace-runtime-bundle" --namespace "https://github.com/paul-barzallo/skill-prd-to-product-agents/spdx/prd-to-product-agents-workspace-runtime-bundle" --repo "paul-barzallo/skill-prd-to-product-agents" --signer-workflow "paul-barzallo/skill-prd-to-product-agents/.github/workflows/build-skill-binaries.yml" --source-ref "refs/heads/main"
          chmod +x "${ROOT_BIN_DIR}"/skill-dev-cli-linux-x64 \
                    "${ROOT_BIN_DIR}"/skill-dev-cli-darwin-arm64 \
                    "${SKILL_BIN_DIR}"/prd-to-product-agents-cli-linux-x64 \
                    "${SKILL_BIN_DIR}"/prd-to-product-agents-cli-darwin-arm64 \
                    "${WORKSPACE_RUNTIME_BIN_DIR}"/prdtp-agents-functions-cli-linux-x64 \
                    "${WORKSPACE_RUNTIME_BIN_DIR}"/prdtp-agents-functions-cli-darwin-arm64

      - name: Package contract acceptance
        run: |
          set -euo pipefail
          TMP_ROOT="$(mktemp -d)"
          trap 'rm -rf "${TMP_ROOT}"' EXIT
          cp -R .agents/skills/prd-to-product-agents "${TMP_ROOT}/prd-to-product-agents"
          chmod +x "${TMP_ROOT}/prd-to-product-agents/bin/prd-to-product-agents-cli-linux-x64" \
                    "${TMP_ROOT}/prd-to-product-agents/templates/workspace/.agents/bin/prd-to-product-agents/prdtp-agents-functions-cli-linux-x64"
          "${TMP_ROOT}/prd-to-product-agents/bin/prd-to-product-agents-cli-linux-x64" \
            --skill-root "${TMP_ROOT}/prd-to-product-agents" validate package
          "${TMP_ROOT}/prd-to-product-agents/bin/prd-to-product-agents-cli-linux-x64" \
            --skill-root "${TMP_ROOT}/prd-to-product-agents" bootstrap workspace \
            --target "${TMP_ROOT}/workspace" --skip-git --skip-db-init
          RUNTIME="${TMP_ROOT}/prd-to-product-agents/templates/workspace/.agents/bin/prd-to-product-agents/prdtp-agents-functions-cli-linux-x64"
          if "${RUNTIME}" --help | grep -qE '^[[:space:]]+github([[:space:]]|$)'; then
            echo "published runtime unexpectedly exposes github command" >&2
            exit 1
          fi
          if "${RUNTIME}" governance --help | grep -qE '^[[:space:]]+promote-enterprise-readiness([[:space:]]|$)'; then
            echo "published runtime unexpectedly exposes enterprise promotion helper" >&2
            exit 1
          fi
          if "${RUNTIME}" audit --help | grep -qE '^[[:space:]]+export([[:space:]]|$)'; then
            echo "published runtime unexpectedly exposes audit export" >&2
            exit 1
          fi

      - name: Create binary refresh pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/refresh-scoped-binaries
          delete-branch: true
          commit-message: "chore(bin): refresh scoped prebuilt binaries"
          title: "chore(bin): refresh scoped prebuilt binaries"
          body: |
            ## Summary
            - refresh tracked scoped binaries after build, test, and release-gate passed
            - source workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - source commit: ${{ github.sha }}

            ## Review notes
            - verify tracked binaries and checksum manifests before merge
            - this PR is the only supported path for refreshing tracked publishable binaries from CI
          labels: |
            kind:chore
            role:ops
            priority:medium
          add-paths: |
            bin
            .agents/skills/prd-to-product-agents/bin
            .agents/skills/prd-to-product-agents/templates/workspace/.agents/bin/prd-to-product-agents
