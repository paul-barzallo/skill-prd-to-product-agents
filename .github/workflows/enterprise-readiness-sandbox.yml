name: Enterprise Readiness Sandbox

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sandbox-readiness:
    runs-on: ubuntu-latest
    env:
      SANDBOX_REPO: ${{ vars.PRDTP_SANDBOX_REPO }}
      RELEASE_GATE_LOGIN: ${{ vars.PRDTP_SANDBOX_RELEASE_GATE_LOGIN }}
      REVIEWER_PRODUCT: ${{ vars.PRDTP_SANDBOX_REVIEWER_PRODUCT }}
      REVIEWER_ARCHITECTURE: ${{ vars.PRDTP_SANDBOX_REVIEWER_ARCHITECTURE }}
      REVIEWER_TECH_LEAD: ${{ vars.PRDTP_SANDBOX_REVIEWER_TECH_LEAD }}
      REVIEWER_QA: ${{ vars.PRDTP_SANDBOX_REVIEWER_QA }}
      REVIEWER_DEVOPS: ${{ vars.PRDTP_SANDBOX_REVIEWER_DEVOPS }}
      REVIEWER_INFRA: ${{ vars.PRDTP_SANDBOX_REVIEWER_INFRA }}
      REVIEWER_INFRA_LOGIN: ${{ vars.PRDTP_SANDBOX_REVIEWER_INFRA_LOGIN }}
      AUDIT_REMOTE_ENDPOINT: ${{ vars.PRDTP_SANDBOX_AUDIT_ENDPOINT }}
      GH_TOKEN: ${{ secrets.PRDTP_SANDBOX_GH_TOKEN }}
      PRDTP_GITHUB_TOKEN: ${{ secrets.PRDTP_SANDBOX_GH_TOKEN }}
      PRDTP_SANDBOX_AUDIT_AUTH: ${{ secrets.PRDTP_SANDBOX_AUDIT_AUTH }}
      EVIDENCE_DIR: .artifacts/enterprise-readiness-evidence
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Prepare evidence directory
        run: mkdir -p "$EVIDENCE_DIR"

      - name: Record workflow context
        run: |
          set -euo pipefail
          {
            echo "repository=${GITHUB_REPOSITORY}"
            echo "ref=${GITHUB_REF}"
            echo "sha=${GITHUB_SHA}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_url=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "sandbox_repo=${SANDBOX_REPO}"
          } > "$EVIDENCE_DIR/workflow-context.txt"

      - name: Validate sandbox configuration
        run: |
          set -euo pipefail
          for value in \
            "$SANDBOX_REPO" \
            "$RELEASE_GATE_LOGIN" \
            "$REVIEWER_PRODUCT" \
            "$REVIEWER_ARCHITECTURE" \
            "$REVIEWER_TECH_LEAD" \
            "$REVIEWER_QA" \
            "$REVIEWER_DEVOPS" \
            "$REVIEWER_INFRA" \
            "$REVIEWER_INFRA_LOGIN" \
            "$AUDIT_REMOTE_ENDPOINT" \
            "$PRDTP_SANDBOX_AUDIT_AUTH" \
            "$GH_TOKEN"; do
            if [[ -z "$value" ]]; then
              echo "Missing sandbox variables or secrets. Configure the PRDTP_SANDBOX_* variables plus PRDTP_SANDBOX_GH_TOKEN and PRDTP_SANDBOX_AUDIT_AUTH before running this workflow." >&2
              exit 1
            fi
          done

      - name: Stage isolated packaged skill
        id: skill
        run: |
          set -euo pipefail
          root="$(mktemp -d)"
          skill_root="$root/prd-to-product-agents"
          bootstrap_cli="$skill_root/bin/prd-to-product-agents-cli-linux-x64"
          runtime_cli="$skill_root/templates/workspace/.agents/bin/prd-to-product-agents/prdtp-agents-functions-cli-linux-x64"
          cp -R .agents/skills/prd-to-product-agents "$skill_root"
          chmod +x "$bootstrap_cli" "$runtime_cli"
          {
            echo "skill_root=$skill_root"
            echo "bootstrap_cli=$bootstrap_cli"
            echo "runtime_cli=$runtime_cli"
          } >> "$GITHUB_OUTPUT"
          {
            echo "skill_root=$skill_root"
            echo "bootstrap_cli=$bootstrap_cli"
            echo "runtime_cli=$runtime_cli"
          } > "$EVIDENCE_DIR/packaged-skill-paths.txt"

      - name: Validate packaged skill release candidate
        run: |
          set -euo pipefail
          "${{ steps.skill.outputs.bootstrap_cli }}" \
            --skill-root "${{ steps.skill.outputs.skill_root }}" \
            validate package 2>&1 | tee "$EVIDENCE_DIR/package-validate.txt"

      - name: Bootstrap temporary workspace from isolated packaged skill
        id: bootstrap
        run: |
          set -euo pipefail
          workspace="$(mktemp -d)"
          echo "workspace=$workspace" >> "$GITHUB_OUTPUT"
          "${{ steps.skill.outputs.bootstrap_cli }}" \
            --skill-root "${{ steps.skill.outputs.skill_root }}" \
            bootstrap workspace \
            --target "$workspace" 2>&1 | tee "$EVIDENCE_DIR/bootstrap-workspace.txt"
          cp "$workspace/.state/bootstrap-report.md" "$EVIDENCE_DIR/bootstrap-report.md"
          cp "$workspace/.state/bootstrap-manifest.txt" "$EVIDENCE_DIR/bootstrap-manifest.txt"

      - name: Configure governance skeleton
        run: |
          set -euo pipefail
          owner="${SANDBOX_REPO%%/*}"
          repo="${SANDBOX_REPO##*/}"
          "${{ steps.skill.outputs.runtime_cli }}" \
            --workspace "${{ steps.bootstrap.outputs.workspace }}" \
            governance configure \
            --owner "$owner" \
            --repo "$repo" \
            --release-gate-login "$RELEASE_GATE_LOGIN" \
            --reviewer-product "$REVIEWER_PRODUCT" \
            --reviewer-architecture "$REVIEWER_ARCHITECTURE" \
            --reviewer-tech-lead "$REVIEWER_TECH_LEAD" \
            --reviewer-qa "$REVIEWER_QA" \
            --reviewer-devops "$REVIEWER_DEVOPS" \
            --reviewer-infra "$REVIEWER_INFRA" \
            --reviewer-infra-login "$REVIEWER_INFRA_LOGIN" \
            --operating-profile enterprise \
            --github-auth-mode token-api \
            --audit-mode remote \
            --audit-remote-endpoint "$AUDIT_REMOTE_ENDPOINT" \
            --audit-remote-auth-header-env PRDTP_SANDBOX_AUDIT_AUTH \
            2>&1 | tee "$EVIDENCE_DIR/governance-configure.txt"

      - name: Promote temp workspace to production-ready contract
        run: |
          set -euo pipefail
          cargo run --quiet --manifest-path cli-tools/prdtp-agents-functions-cli/Cargo.toml -- \
            --workspace "${{ steps.bootstrap.outputs.workspace }}" \
            governance promote-enterprise-readiness 2>&1 | tee "$EVIDENCE_DIR/governance-promote-enterprise-readiness.txt"

      - name: Capture configured governance snapshot
        run: |
          set -euo pipefail
          workspace="${{ steps.bootstrap.outputs.workspace }}"
          cp "$workspace/.github/github-governance.yaml" "$EVIDENCE_DIR/github-governance.yaml"

      - name: Refresh capabilities and validate configured gate
        run: |
          set -euo pipefail
          "${{ steps.skill.outputs.runtime_cli }}" \
            --workspace "${{ steps.bootstrap.outputs.workspace }}" \
            capabilities detect 2>&1 | tee "$EVIDENCE_DIR/capabilities-detect.txt"
          cp "${{ steps.bootstrap.outputs.workspace }}/.github/workspace-capabilities.yaml" "$EVIDENCE_DIR/workspace-capabilities.yaml"
          "${{ steps.skill.outputs.runtime_cli }}" \
            --workspace "${{ steps.bootstrap.outputs.workspace }}" \
            validate governance 2>&1 | tee "$EVIDENCE_DIR/validate-governance.txt"

      - name: Provision enterprise controls
        run: |
          set -euo pipefail
          "${{ steps.skill.outputs.runtime_cli }}" \
            --workspace "${{ steps.bootstrap.outputs.workspace }}" \
            governance provision-enterprise 2>&1 | tee "$EVIDENCE_DIR/provision-enterprise.txt"

      - name: Validate readiness and audit path
        run: |
          set -euo pipefail
          "${{ steps.skill.outputs.runtime_cli }}" \
            --workspace "${{ steps.bootstrap.outputs.workspace }}" \
            validate readiness 2>&1 | tee "$EVIDENCE_DIR/validate-readiness.txt"
          "${{ steps.skill.outputs.runtime_cli }}" \
            --workspace "${{ steps.bootstrap.outputs.workspace }}" \
            audit sink health 2>&1 | tee "$EVIDENCE_DIR/audit-sink-health.txt"
          "${{ steps.skill.outputs.runtime_cli }}" \
            --workspace "${{ steps.bootstrap.outputs.workspace }}" \
            audit sink test 2>&1 | tee "$EVIDENCE_DIR/audit-sink-test.txt"

      - name: Capture remote evidence
        run: |
          set -euo pipefail
          workspace="${{ steps.bootstrap.outputs.workspace }}"
          gh api "repos/$SANDBOX_REPO" > "$EVIDENCE_DIR/repository.json"
          gh api "users/$RELEASE_GATE_LOGIN" > "$EVIDENCE_DIR/release-gate-login.json"
          gh api "users/$REVIEWER_INFRA_LOGIN" > "$EVIDENCE_DIR/immutable-governance-infra-login.json"
          gh api "repos/$SANDBOX_REPO/labels?per_page=100" > "$EVIDENCE_DIR/labels.json"
          for branch in main develop; do
            gh api "repos/$SANDBOX_REPO/branches/$branch/protection" > "$EVIDENCE_DIR/branch-protection-$branch.json"
          done
          if [[ -f "$workspace/.state/audit/sensitive-actions.jsonl" ]]; then
            cp "$workspace/.state/audit/sensitive-actions.jsonl" "$EVIDENCE_DIR/sensitive-actions.jsonl"
          fi

      - name: Upload enterprise readiness evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: enterprise-readiness-evidence
          path: ${{ env.EVIDENCE_DIR }}
