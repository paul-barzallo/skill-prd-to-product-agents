default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: end-of-file-fixer
        exclude: \.md$
      - id: trailing-whitespace
        exclude: \.md$
      - id: check-yaml
        files: \.(yaml|yml)$

  - repo: local
    hooks:
      - id: repo-workflow-validation
        name: repo workflow validation
        entry: cargo run --manifest-path cli-tools/skill-dev-cli/Cargo.toml -- --skill-root . test repo-validation
        language: system
        pass_filenames: false
        files: ^(\.agents/skills/prd-to-product-agents/|cli-tools/|docs/|bin/|\.github/workflows/|\.pre-commit-config\.yaml$|\.editorconfig$|\.markdownlint\.json$|AGENTS\.md$|README\.md$)
        stages:
          - pre-commit
          - pre-push
