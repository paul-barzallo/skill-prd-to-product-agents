default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: end-of-file-fixer
        exclude: \.md$
      - id: trailing-whitespace
        exclude: \.md$
      - id: check-yaml
        files: \.(yaml|yml)$

  - repo: local
    hooks:
      - id: repo-markdown-contract
        name: repo markdown contract
        entry: cargo run --manifest-path cli-tools/skill-dev-cli/Cargo.toml -- --skill-root . test markdown
        language: system
        pass_filenames: false
        files: (^README\.md$|^AGENTS\.md$|^docs/|^\.agents/skills/prd-to-product-agents/.*\.md$|^\.github/.*\.md$)

      - id: skill-package-validate-all
        name: skill package validate all
        entry: cargo run --manifest-path cli-tools/prd-to-product-agents-cli/Cargo.toml -- --skill-root . validate all
        language: system
        pass_filenames: false
        files: ^(cli-tools/prd-to-product-agents-cli/|cli-tools/prdtp-agents-functions-cli/|\.agents/skills/prd-to-product-agents/|\.github/workflows/)
        stages:
          - pre-push

      - id: repo-release-gate
        name: repo release gate
        entry: cargo run --manifest-path cli-tools/skill-dev-cli/Cargo.toml -- --skill-root . test release-gate
        language: system
        pass_filenames: false
        files: ^(cli-tools/|\.agents/skills/prd-to-product-agents/|docs/|bin/|\.github/workflows/)
        stages:
          - pre-push
