name: PR Governance

on:
  pull_request:
    branches: [develop, main]
    types: [opened, edited, synchronize, reopened, labeled, unlabeled, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-contract:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup runtime CLI
        uses: ./.github/actions/setup-cli

      - name: Validate PR governance contract
        run: prdtp-agents-functions-cli --workspace . validate pr-governance --event-path "${GITHUB_EVENT_PATH}"

      - name: Validate final release gate
        if: github.event.pull_request.base.ref == 'main'
        run: prdtp-agents-functions-cli --workspace . validate release-gate --event-path "${GITHUB_EVENT_PATH}"

      - name: Encoding gate via workspace runtime CLI
        run: prdtp-agents-functions-cli --workspace . validate encoding

      - name: Verify agent assembly
        run: prdtp-agents-functions-cli --workspace . agents assemble --verify
